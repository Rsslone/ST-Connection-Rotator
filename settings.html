<div id="connection_rotator_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Connection Rotator</b>
            <div class="fa-solid fa-circle-chevron-down inline-drawer-icon down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="rotator-description">
                Rotate between Connection profiles per message.
            </div>

            <div class="rotator-toolbar">
                <div class="rotator-toggles">
                    <label class="checkbox_label">
                        <input type="checkbox" id="rotator_enabled" />
                        <span>Enabled</span>
                    </label>
                    <label class="checkbox_label">
                        <input type="checkbox" id="rotator_per_chat" />
                        <span>Per-chat counter</span>
                    </label>
                    <label class="checkbox_label">
                        <input type="checkbox" id="rotator_include_swipes" />
                        <span>Include swipes</span>
                    </label>
                    <label class="checkbox_label">
                        <input type="checkbox" id="rotator_include_quiet" />
                        <span>Include silent generations</span>
                        <div class="fa-solid fa-circle-info opacity50p" title="When on, background/silent generations triggered by other extensions (e.g. plugins, auto-tools) consume a rotation slot and trigger a profile switch. When off (default), they are ignored — no switch, no counter advance."></div>
                    </label>
                </div>
                <div class="rotator-mode-row">
                    <label for="rotator_mode" class="rotator-mode-label">
                        Mode
                    </label>
                    <select id="rotator_mode" class="text_pole">
                        <option value="ordered">Ordered</option>
                        <option value="weighted">Weighted</option>
                    </select>
                    <div class="fa-solid fa-circle-info opacity50p" title="Ordered: each profile runs for N consecutive messages in sequence, then loops back to the first.&#13;Weighted: each message picks a profile at random, with probability proportional to its weight."></div>
                </div>
                <div class="rotator-actions">
                    <div class="menu_button menu_button_icon" id="rotator_add" title="Add rotation entry">
                        <i class="fa-solid fa-plus"></i>
                        <small>Add</small>
                    </div>
                    <div class="menu_button menu_button_icon" id="rotator_reset" title="Reset message counter to 0">
                        <i class="fa-solid fa-rotate-left"></i>
                        <small>Reset</small>
                    </div>
                </div>
            </div>

            <div class="rotator-status">
                <span>Next message: <b id="rotator_next_profile">—</b></span>
                <span>Counter: <b id="rotator_counter">0</b></span>
            </div>

            <div id="rotator_list" class="rotator-list">
                <!-- Entries rendered here by JS -->
            </div>
        </div>
    </div>
</div>
